<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Wallpaper Layer</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        .wallpaper {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            transition: opacity 1.5s ease-in-out;
            opacity: 0;
        }
        .active { opacity: 1; margin: 0; padding: 0; }
        .prompt-info { 
            position: absolute; bottom: 20px; right: 20px; 
            color: rgba(255, 255, 255, 0.4); font-family: sans-serif; 
            font-size: 12px; pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body>
    <div id="bg1" class="wallpaper active"></div>
    <div id="bg2" class="wallpaper"></div>
    <div class="prompt-info" id="promptDisplay"></div>

    <script>
        let currentIdx = 1;
        window.setWallpaper = function(url, promptText) {
            const nextIdx = currentIdx === 1 ? 2 : 1;
            const currentEl = document.getElementById('bg' + currentIdx);
            const nextEl = document.getElementById('bg' + nextIdx);

            nextEl.style.backgroundImage = `url('${url}')`;
            nextEl.classList.add('active');
            currentEl.classList.remove('active');
            
            document.getElementById('promptDisplay').innerText = promptText;
            currentIdx = nextIdx;
            console.log("Wallpaper updated:", url);
        };
    </script>
</body>
</html>
