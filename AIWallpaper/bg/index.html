<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Wallpaper Engine Layer</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: #000; display: flex; justify-content: center; align-items: center; }
        img { width: 100%; height: 100%; object-fit: cover; }
        .prompt-info { position: absolute; bottom: 20px; left: 20px; color: rgba(255, 255, 255, 0.7); font-family: sans-serif; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); font-size: 14px; }
    </style>
</head>
<body>
    <img id="wallpaper" src="https://images.unsplash.com/photo-1518791841217-8f162f1e1131" alt="AI Wallpaper">
    <div class="prompt-info" id="promptDisplay">Default Wallpaper</div>

    <script>
        // 供 Rust 后端调用的更新方法
        window.setWallpaper = function(newUrl, promptText) {
            document.getElementById('wallpaper').src = newUrl;
            document.getElementById('promptDisplay').innerText = promptText;
        };
    </script>
</body>
</html>
