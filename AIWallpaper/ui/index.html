<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wall-E AI Wallpaper Control</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 20px; width: 100%; max-width: 320px; }
        h1 { font-size: 1.5rem; text-align: center; color: #333; }
        textarea { width: 100%; border: 1px solid #ddd; border-radius: 4px; padding: 10px; resize: none; }
        button { margin-top: 15px; width: 100%; background: #007bff; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #0056b3; }
        #preview-wrap { margin-top: 16px; display: none; }
        #preview-wrap img { width: 100%; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); animation: fadeIn 0.5s ease; }
        #preview-label { font-size: 0.78rem; color: #999; text-align: center; margin-top: 4px; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div class="card">
        <h1>AI 壁纸控制面板</h1>
        <div style="margin-bottom: 10px;">
            <input type="password" id="apiKey" placeholder="输入文心 API Key (设置后保存)" style="width: 100%; padding: 8px; box-sizing: border-box;">
            <button onclick="saveKey()" style="background: #28a745; margin-top: 5px;">保存 Key</button>
        </div>
        <hr>
        <textarea id="prompt" rows="4" placeholder="在此输入生成壁纸的提示词..."></textarea>
        <div id="status" style="margin-top: 10px; font-size: 0.9rem; color: #666; text-align: center; min-height: 1.2rem;"></div>
        <button id="genBtn" onclick="generate()">生成并设为壁纸</button>
        <div id="preview-wrap">
            <img id="preview-img" src="" alt="生成的壁纸预览">
            <div id="preview-label">↑ 已设置为桌面壁纸</div>
        </div>
    </div>

    <script>
        const statusDiv = document.getElementById('status');
        const genBtn = document.getElementById('genBtn');

        function setStatus(text, isError = false) {
            statusDiv.innerText = text;
            statusDiv.style.color = isError ? "#dc3545" : "#666";
        }

        function saveKey() {
            const key = document.getElementById('apiKey').value;
            if (key) {
                window.ipc.postMessage(JSON.stringify({ type: "save_key", value: key }));
                setStatus("Key 已保存");
            }
        }

        function generate() {
            const promptValue = document.getElementById('prompt').value;
            if (!promptValue) {
                setStatus("请输入提示词", true);
                return;
            }
            
            genBtn.disabled = true;
            genBtn.innerText = "正在生成中...";
            setStatus("正在调用文心大模型生成图片，请稍候...");
            
            window.ipc.postMessage(JSON.stringify({ type: "generate", value: promptValue }));
        }

        // 监听来自 Rust 的消息（如果需要反馈更具体的状态）
        window.addEventListener('message', (event) => {
            // 目前主要通过 Rust 执行 evaluate_script 来改变 UI 状态
        });

        // 供 Rust 调用的反馈方法
        window.onGenerationComplete = function(success, errorMsg, imageUrl) {
            genBtn.disabled = false;
            genBtn.innerText = "生成并设为壁纸";
            if (success) {
                setStatus("壁纸已更新！");
                setTimeout(() => setStatus(""), 4000);
                if (imageUrl) {
                    const wrap = document.getElementById('preview-wrap');
                    const img = document.getElementById('preview-img');
                    img.src = imageUrl;
                    wrap.style.display = 'block';
                }
            } else {
                setStatus("生成失败: " + errorMsg, true);
            }
        };
    </script>

</body>

</html>
